很有把握生活不成問題圓子道你既説生活有把握我就沒旁的問題了我也無在日本勾留的必要我在這裏本沒定長時間的約做一個月算一個月隨時可走的我和番頭説一聲就行黃文漢道這好極了你有粗重的行李麼圓子搖頭笑道講到我行李真可笑僅一個小小的衣包以外什麼也沒有黃文漢道你就去向番頭辭職罷今晚同去旅館裏住宿圓子點頭起身下樓去了不一時只見他提著一個衣包同芳子吉子進來將衣包揚給黃文漢看道我的行李盡在這裏黃文漢同黎鄭二人起身道料理帳給了麼圓子道就把我的工資算給了我兩個月的工資吃一頓還不夠呢黃文漢歎道高樓一桌席貧漢十年糧真是不錯圓子給衣包黃文漢提了回身與芳子吉子握手忍不住眼圈兒紅了道想不到倉卒與兩位妹妹分別此後還不知道有再和兩位妹妹見面的緣沒有芳子吉子都流下淚來因圓子平日為人極好七八個酌婦都和圓子説得來就中芳子吉子兩個尤了圓子親密今猝然分別自不免淒戀六人一同下樓圓子進裏面辭別番頭及所有同事都跑出來送到大門外皆有些依依不捨之態芳子吉子更哽咽得出了聲圓子走了好遠回頭向二人揮手巾教二人進去二人直看得沒有影子了才轉身進門黃文漢帶著圓子在旅館住了一夜次日略買了幾件衣服給圓子更換也懶得在東京逗留第三日即同圓子坐火車到長崎由長崎買輪回上海去了後來黃文漢在雲南當了兩年差替唐督軍當駐京代表圓子生了兩個很好的兒子凡和黃文漢有交情的朋友無一個不羡慕圓子是黃文漢的好內助這都是題外之文不必説了再説黎是韋鄭紹畋那日別了黃文漢黎是韋把黃周二人昨夜來説的話説了一遍道我特來找你同去林簡青家開談判不料被黃文漢耽擱了這大半日此時才打過三點鍾還可以去質問他鄭紹畋道我陪你去可以只不會説話黎是韋道話不必你説自有我問他不怕他抵賴了去鄭紹畋才答應了二人乘電車到淺草尋著了林簡青的家林簡青正才下課回來見二人進來知道必是為開會的事只得延進客房裏就坐黎是韋開口説道我兩人特來質問會長一句話請會長答復周撰與會長有交情我們知道陳蒿與會長的太太同學我們也知道會長幫周撰陳蒿的忙一是朋友之情不可卻一是太太之命不敢違我們更知道能替會長原諒但是會長論資格是堂堂正正的湖南同鄉會會長論平日為人是我們素所敬服的磊落光明的好學生要幫周撰的忙應該當面鼓對面鑼的在會場上當衆侃侃而談將我們所持開會的理由駁得不能成立才是會長應有的行為應取的態度為什麼鬼鬼祟祟的寫信把周撰陳蒿叫家裏來沽私恩市私惠教他糾集無賴搗亂會場這湖南同鄉會便是會長一個人的嗎我們所請二十日開會會長還怕時間倉卒了周撰來不及拉人硬要將會期改至禮拜三下午請問會長這是一種什麼理由望即明白答復林簡青聽了驚得臉上變了顔色一時也摸不著如何泄漏的道理只得勉強道説足下這話從哪里説起來的我簡直摸不著頭腦黎是韋冷笑道會長不要裝佯罷會長認錯了人呢周撰不是個好東西他把會長替他出的主意盡情向人宣布了會長不在睡裏夢裏麼林簡青心想我和周撰陳蒿商量的話就只我們四個人知道若不是他兩人在外面亂説黎是韋如何知道這般詳細呢我好意幫他們他們反是這麼害我真氣死我了好好我也顧不得你們了這須怨不得我隨向黎是韋道足下説的話我絶對不是裝佯確是我腦筋裏沒一些兒影子我和周撰毫無所謂交情就是敝內雖和陳育姊妹在國內同過學近數月也沒有往來便是有交情他們的行為不正當我也不至從井救人足下所聽的話是不是真出自周撰陳蒿之口我姑不深論總之即算是他二人説的與我也沒有關係是他二人假借我的話去哄騙人的足下萬萬不可信延期至禮拜三的話我是曾對許多朋友説過因此今日還不曾發傳單只寫了封信通知足下今早付郵的不知足下接著了沒有黎是韋道我出來很早沒有接著什麼信依會長的話教他糾人搗亂會場的事是沒有的林簡青道沒有黎是韋道教他趁開會的時候將我和鄭如畋向陳蒿求婚的信送到人場來由會長發表的事有沒有呢林簡青搖頭道哪有這事黎是韋道此時會長説沒有就算沒有我沒憑據提向會長證實不過地長得留神一點這話既泄漏出來了凡是湖南同鄉都得著了這消息那日開會的時候要沒這兩項事實發生才好若果實現了我們卻已早為之備於會議程式毫無妨礙只怕于會長個人有許多不便呢我們特來警告一聲任憑尊意裁處林簡青只好忍氣吞聲的説道足下但請放心如那日會場上發生了這兩面問題我不竭力維持秩序就算我是教唆的不過他們是這麼做不是這做我就不能保險因為這兩項舉動都不必我教唆他們也能做我只能盡我的責任就是黎是韋道到那時是非自有公論會長莫以為要求開會是我領銜便是我的主動暗中主動的人還多得很哩到開會時請會長看罷林簡青道這種會主張開的自然很多便是我也是主張開會的一個黎是韋道好但願會長言行相顧我們會場上見罷説罷同鄭紹畋告辭起身林簡青也不挽留送至大門口轉身進房向林太太跺腳道蔔先老二都不是東西我們幫他他倒害得我受人家的臉嘴真是沒得倒楣了林太太問是怎麼林簡青將黎是韋的話約略述了一遍林太太也氣得什麼似的説這事怎的辦呢林簡青道有什麼怎的辦寫封信給兩個狗男女説事情已經泄漏萬不能再照著實行即實行也是無用徒使我為難倒不如聽之任之或者我還有能暗中盡力的時候若再實行出來我勢必立腳不詮我一辭職於事情更無希望了是這麼寫封信給他我想他決不至再冒昧做去了林簡青當夜詳細寫了封信寄給周撰周撰接了大吃一嚇知道是錯認了黃老三但已後悔無及也不好意思再去林簡青家只回了封信遵命停止進行也不再出外運動到了二十三那日還不到午後一點鍾大松俱樂部門首到會的就擁擠不堪都是看了那竹枝詞哄動了全省留學生無不想看看這種新奇會議黎是韋又在竹枝詞尾上注了禮拜三下午在大松俱樂部開同鄉會研究這事的幾行字比傳單的效力還大些這日到會的很有些年高有德的人公推黎謀五先生主席林簡青見了這種情形深悔自己見事不到幸虧早經泄漏若是事後被人調查出來還有臉見人嗎不過一點鍾會場上擠了四百多人湖南的留不生差不多到齊了黎謀五先生上臺説道今日開會為研究周撰和陳蒿結婚的事這題目就很好笑人家結婚與同鄉會有何相干要同鄉會來開會研究呢這其中不待説是很有可研究的道理道理在哪里哩在維持社會道德與祛除女學的障礙周撰生成一個作惡的性質濟之以作惡之才貌因之所行所為無一不損及個人道德與公共道德在嶽州騙娶定兒在日本先騙娶松子後騙娶陳蒿特其作惡之一端耳至其鑽營苟賤充湯薌銘偵探尤為卑劣無恥這種人同鄉會決不能再容其同居斯土披猖肆恣此所謂維持社會道德我國女學方在萌芽送到日本來留學的猶是少數近年來女學所以不發達之故原因雖不一端然浮薄青年引誘女生之魔障亦占原因之一六部分陳蒿一人詎如此足惜惟因陳蒿之事而使內地之為父母者更引為深戒不敢再送其女來日本讀書這障礙女學進步就很大了我所以説祛除女學障礙我的主張由同鄉會具函湖南留學生監督處撤銷二人公費將二人驅逐回國以示警懲諸君或再有交好的辦法請上來發表周之冕接著上臺即將黎謀五先生的話重行申引一遍將辦法付表決全場通過只這一來周撰陳蒿二人的公費便輕輕的撤銷了次日周撰即接監督處的通知書和陳蒿面面相覷既沒了公費便不驅逐也不能在日本住了只得垂頭喪氣的卷起行囊同歸上海由上海歸湖南在湯薌銘跟前混碗飯吃後來南軍驅湯被程廳長把他拿著做偵探槍決了不肖生寫到這裏心想這部留東外史本是用周撰起首的恰好到這裏得了個天然的結束正好趁勢丟下筆來從此做個好人謹守著間談無論人非的格言了
