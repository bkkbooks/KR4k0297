body:
  text: 留東外史第三部不肖生著第六十一章作兒女語一對可憐蟲論國民性許多無恥物話説鄭紹畋對黃文漢長歎了一聲道我別後的事説來很長總之周蔔先對我不住就是了當初我和他兩個人同住貸家的時候原説了家用各擔任一半牌賭上抽的頭錢看是誰邀成的局誰得十分之六哪曉得他後來只管教我每天出去拉人和上海野雞拉客一般腿都跑痛拉成了局頭錢抽下來十有九在他手裏我問他要他不是説借著用用便説月底做一起算帳我想和他吵也是不好不吵嗎實在受氣不過後來越弄越不成話了他松子薦給我的幸枝也和他苟且起來我忍不住便和他散了夥差我四十多塊錢一個也不算給我沒法只得把平日常來玩耍的人請了幾個到維新料理店弄了幾樣萊教這些人評理周蔔先也來了你説他乖覺不乖覺他來吃了個酒醉飯飽正待和他開始談判他借著小便下樓一溜煙走了倒花了我四五塊錢你看這事情可氣不可氣黃文漢笑道後來你會著他沒有鄭紹畋道會著他倒好了他吃了我的酒菜不到幾天就回中國去了直到前幾日才來我去會他幾次也都沒有會著黃文漢道還去會他做什麼他還有錢給你嗎你此刻到哪里去鄭紹畋道我到本鄉去看個朋友黃文漢點點頭道改日再見説完攜著圓子慢慢的走到蘇仲武家來此時蘇仲武剛起來坐在窗前看梅子勻臉見黃文漢和圓子進來忙推了梅子一下道你看你看姐姐來了梅子笑道別哄我姐姐哪得這麼早圓子已在門口聽得笑答道還早嗎梅子聽真是圓子來了才立起身來笑道他慣這麼哄我我只道又是哄我的我不肯上他的當就不信他圓子笑道你的這個人本來慣哄人的不信他也罷了他前日一個人到我那裏説了一句話我有些放心不下所以特來看看你説罷已脫了木屐同進房來蘇仲武迎著黃文漢笑道你今日來得正好明日是雙十節我正想邀幾個朋友來弄點酒菜高興一會子梅子先送了個蒲團給黃文漢再將自己坐的給圓子坐圓子也不謙讓便坐了梅子忙著遞煙茶黃文漢笑問蘇仲武道你想就在這裏慶祝雙十節嗎我勸你不要勞神罷住貸間又沒用下女請些客來鬧酒不是自討苦吃蘇仲武道只要大家高興便勞一勞神也沒要緊黃文漢沈吟了一會道你若想鬧酒倒有一處地方好去這人你也認識的蘇仲武問道是誰住在哪里黃文漢道鬧酒在市外好些市內若鬧狠了旁人干涉得討厭我説的是劉越石家裏他住在代代木一連三家都是熟人胡莊近來也住在那裏不如今日去通知他們一聲大家鬥份子今晚就教他們預備三家合做一塊要鬧就大鬧它一回你説好麼蘇仲武喜道還有什麼不好我們此刻就去通知罷黃文漢笑道你真是個小孩子樣何用如此著忙事情包在我身上就是蘇黃二人説中國話此時的梅子早知道黃文漢是中國人了圓子不知二人説些什麼向黃文漢笑道你們議論我們些什麼蘇仲武笑道他説嫂子昨晚沒説完梅子掉過臉來笑道姐姐不要聽他蘇仲武笑道你們不聽罷了他實在是説嫂子的話圓子笑道我倒沒話給他説我妹妹卻將你的笑話對我説得不少了虧你好意思蘇仲武瞪了梅子一眼道我有什麼不好意思説出來大家聽聽不要緊圓子見蘇仲武有些發急的樣子梅子的臉色也不甚好看忙笑道你且將他説我的話説給我聽了我再告訴你大家一句玩話你也要認真嗎那就更好笑了梅子冷笑了聲道你們説玩話不要緊不與我相干我犯不著挨瞪真是笑話我又沒開口瞪我怎的蘇仲武見梅子著急翻悔自己魯莽不疊賠笑説道我瞪你不為別的我怕你真説給嫂子聽可不要給嫂子笑話梅子紅了臉道便説給他聽了你該怎麼樣你干涉不了許多蘇仲武不敢再説黃文漢笑向蘇仲武道你無端要向他們挑戰及至兵臨城下你又肉袒牽羊以迎算了罷他們姊妹素來是無所不談我真沒有資格干涉況且你自己也時常拿著話到我那裏來説你前日不是還説什麼身上兩個月沒有來恐怕是坐了喜的話嗎説得你嫂子不放心昨日就要拉著來看因來了兩個客就耽擱了今日才一早來梅子聽了急得杏臉通紅立起身來也不管有人在房裏按著蘇仲武只管用那粉團一般的拳頭來打蘇仲武連賠不是黃文漢坐在一旁只笑著説打得好圓子見梅子氣得變了色知他身體不好怕急出毛病來忙起身將梅子拉開笑著勸道蘇先生真不懂事只管是這般瞎説幸好都不是外人你我親姊妹親兄弟一樣這次看我的面子可以饒恕他下次我卻不管了蘇仲武道是嗎我又沒和旁人説都是自家人有什麼要緊我因為不放心才去和他們説恐怕是別的病證不診不得了難道我拿著你的事去給人家開心老黃有意挑撥想給我苦吃你何必信他將自己氣到這樣梅子也不理蘇仲武坐在圓子身邊低著頭也像有些懊悔黃文漢笑道你還説我挑撥你自己説是誰先有意挑撥的蘇仲武連連搖手道不用説了橫豎我孤掌難鳴不是你二人的敵手若再説下去可真要同室操戈了黃文漢便笑著不做聲圓子勸梅子不要受氣梅子也漸漸想開了知道不能怪蘇仲武將氣平了許多圓子悄悄問梅子道你身上本是兩個月沒來了嗎這不是當耍的梅子又紅了臉低著頭不作聲圓子復問道你從來也是這麼的嗎梅子半晌搖了搖頭圓子道你近來想什麼吃不想圓子的話雖然説得小但是在一間房裏蘇仲武又沒做聲所以聽得清楚見梅子不好意思説便代答道他近來歡喜吃酸的梅子睄了蘇仲武一眼黃文漢忍不住笑起來笑得梅子更加不好意思將臉藏在圓子肩後圓子笑道事也奇怪三個月前妹妹初見我的時候天真爛耍的也不知道什麼叫害羞這完全是蘇先生教壞了動不動就紅起臉來既坐了喜再過幾月就要出世的看你躲到哪里去梅子在圓子肩後説道到那時候我死了教我出醜呢莫想圓子吃了一驚道你這是什麼話女子有生育就要死嗎黃文漢聽了梅子的話心中也自吃驚見圓子盤問梅子恐怕問急了梅子是個小孩子倘若他想到自己與老蘇是胡亂碰上的生出兒子來沒有名義這一層又要生出變端來便對圓子使了個眼色圓子會意用別的話岔開了話頭黃文漢問蘇仲武道你今晚到青年會去麼蘇仲武道且看那時高興不高興你去嗎黃文漢道想去聽聽名士的演説順便去找兩個朋友他們是一定要到會的蘇仲武道你不要忘記了明日的宴會你説了負責任的到那時沒得吃喝我只曉得問你就是了黃文漢笑道那是自然今晚在會場上便可將人都約好你放心有得你吃喝就是了不過明日既去吃喝雙十節的紀念會恐怕不能到了蘇仲武道那會不到也罷了我們在家裏也是一般的慶祝黃文漢便問圓子道我要去看朋友你就在這裏玩一會再回去圓子正和梅子兩個在那裏咬著耳根説話黃文漢説了兩遍圓子才作理會點頭答應了一句又去説話黃文漢便起身出來他們往來親密慣了的不拘形迹蘇仲武只送到房門口就住了黃文漢出了蘇仲武的家因想起郭子蘭在體育學校畢了業柔術暑中稽古暑假練習之意又得了四段的文憑只因家計艱難日內就要歸國謀生活不能不趁此時和他多聚一聚就在神保町坐了往江戶川的電車由江戶川步行到早稻田大學校後面只見郭子蘭正同一個二十六七歲的男子並肩間談著走來黃文漢看那男子儀錶很好舉步穩重倒像個練過把式的人郭子蘭已看見了黃文漢彼此點頭打招呼郭子蘭指著那男子紹介給黃文漢道這位是直隸人姓蔡名煥文是李富東老師的高足功夫純熟得了不得回頭也給蔡煥文紹介了彼此自有一套久聞久仰的話説黃文漢問郭子蘭道你有事到哪兒去嗎郭子蘭搖頭道不是我送蔡君貪著説話便走到這裏來了我們就此轉去罷蔡煥文對二人行了禮説了句後會大踏步走了黃文漢便同郭子蘭向吉原劍師家門首走來黃文漢間蔡煥文到日本來幹什麼的郭子蘭道他本在日本留學一向在中央大學上課只怕差不多要畢業了聽説我要回國特來看看我他在天津發起了一個武德會李富東在那裏當會長他的意思想請我到天津去設法將武德會的勢力擴充我問了問內幕的情形去了恐怕不能相容我投答應他黃文漢道怎的知道怕不能相容郭子蘭道我打聽那會裏的會員有知識的太少了都只曉得走幾路拳踢幾路潭腿就是李富東也不過一個摜交廠的健者別的知識一點也沒有沒有知識的打手門戶的習氣一定很深我這混合派的功夫在他們自然是瞧不起我又何必去哩説時已進了郭子蘭的家黃文漢點頭道既是這樣不去也罷了北方習拳腳的還多就不提倡也不至失了傳授南方實在非人提倡不可你回湖南去提倡起來收效必然很快只恨我素性不歡喜幹正經事不能幫你我若高興提倡保管十年之內南七省的少年個個有幾手神出鬼沒的本領郭子蘭驚異道你用什麼法子提倡能有這般神速黃文漢笑道因勢利導有什麼不容易於今的青年想學兩手的多只因拳師的知識太差教授法固然不好所教的拳腳又不能一律少年人這山望見那山高個個見異思遷盡學盡換一輩子還是一兩年的程度所以學的不願意學教的就改業了我們要提倡下手就要謀中國拳術統一使學者不生門戶之見鬥毆傷生的事就可免了這統一中國的拳術在表面看起來是一樁很難的事其實並不甚難只要一個有力者將各省有大名的幾個教師請來把拳術與中國的關係與世界的關係先説給他們聽然後將派別多了的害處説出來他們多是不會寫字的每人派一個書記給他們教他們各抒己見繪圖著出書來由我們一一的審定將其中有違背生理的或過於狠毒的手法去了由簡而繁的分出初級小學中學高等師範大學各等第來由教育部頒行各省我們再在北京上海各處辦幾個拳術學堂專一造就人才供各省聘請如此十年怕不風行全國嗎豈但南七省郭子蘭聽了笑道好大計劃幸你不歡喜幹正經事倘若你歡喜幹正經事眼見得你跑出去就碰釘子各省最有名的教師是這般容易請來的嗎便請來了是這般容易給你著書的嗎你太把那些有名的教師看容易了你在日本住久了完全忘了中國的國民性這樣的去因勢利導你不給人家打死就早萬幸了想風行全國可謂是理想的夢話不過你這樣信口開河能説出個條理來無論事實上行與不行總算是有資格提倡中國拳術的人了黃文漢笑道這種資格不要也罷了我為人凡事都不肯多研究知道一些兒就罷了我學這樣的時候未嘗不想造成絶技及至見了那樣好耍又漸漸將愛這樣的心移到那樣上面去了近來更不成話什麼都不愛了覺得知道些兒不過如此造到絶頂也不過如此橫豎與身心性命沒有關係郭子蘭笑道與你身心性命有關係的女人之外只怕就是飲酒唱歌了黃文漢笑著不做聲一會兒口中念道設想英雄遲暮日溫柔不住住何鄉念得郭子蘭也笑了黃文漢道明日開國慶紀念會去不去郭子蘭道去看看也好你不待説是要去的黃文漢道你何以見得我定要去郭子蘭笑道你平日最歡喜到會的這樣大會豈有不到之理黃文漢搖頭道不然我於今別有所見我覺得這種會到了很無味共和早亡了還躲在這裏慶祝什麼你看國內不是一點兒聲息也沒有嗎郭子蘭道話卻不能是這樣説袁世凱是這樣專橫國內的人在他勢力之下不敢吐氣難道我們在外國也都默許他嗎這種會是表示我們