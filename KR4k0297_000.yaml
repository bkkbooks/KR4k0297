姐有什麼事陳蒿走近前笑道先生不要見笑我姐夫異常迂腐他若定不肯去也就罷了不用十分勉強他我先説明一聲他生性是這麼的不是不中擡舉負先生的盛意周撰不住點頭道我理會得周撰心裏巴不得李鏡泓不在跟前免得礙眼明知道李鏡泓是個沒能力破壞的人尤可不措意他因對於陳育的面子上才繞道來這裏敷衍敷衍聽了陳蒿的話更是奉行故事了何達武搶先跑到精廬推門進去一看各處的板門都關了房中漆黑的不見李鏡泓説話即轉身向陳育笑道我們不在家老李也出去了房裏關得黑洞洞的我們用不著進去罷陳育道他出去為何不鎖大門呢何達武道他知道我們就要回的若將大門鎖了怎麼進去呢陳育搖頭道他不會這麼荒唐我們又不是沒有安放鑰匙的地方歷來鎖了門誰先回來誰拿鑰匙先開怎麼今日忽然怕鎖了門我們不得進去既到了這裏為什麼不上去看看呢四人都脫了皮靴進房陳育順手將電燈機扭燃一看李鏡泓已打開鋪蓋睡在房裏陳育笑道你這人真可笑清天白日是這麼睡了像個什麼還不快起來周先生特來請你去玩李鏡泓伸出頭來見周撰立在房裏心裏雖一百二十個不高興但是不能露在面上又怕陳育不答應説他得罪了朋友不敢不起來應酬隨即掀開被臥起來一面披衣一面和周撰招呼周撰笑道驚了李先生的美睡很對不起承李太太和小姐枉顧我準備了些不中吃的蔬菜特來請李先生同去隨意吃點車子在外面等著請賞臉就同去罷只是臨時口頭邀請不恭的很李鏡泓散披著衣服也不束帶望著陳育説道這怎麼好呢我實在有些頭痛所以拿出鋪蓋來睡了周先生的好意你就替我去代表領他的情罷我不宜再去外面受風陳育道你若可去就同去也好一個人在家裏也悶得慌李鏡泓道我若能出外受風還待你説你代表我去罷我也不留周先生坐了精神來不及要睡的很陳蒿向周撰努嘴教他出去的意思自己先退了出來周撰便道李先生既不適意請睡下罷散披著衣恐怕涼了並沒什麼可吃的倒弄得李先生受了風添了病症反為不美李鏡泓向周撰告了罪仍脫了衣扯開被臥睡了陳育心裏終覺有些過不去見周撰三人都不在房裏伏身湊近李鏡泓問道你真是有些頭痛嗎李鏡泓搖搖頭道我知道你們一去姓周的必有這些花樣鬧的你看何如呢他的目的我知道我也不能阻攔老二不過你得明白一點你可記得在家裏動身的時候嶽母怎生拉著老二的衣説了些什麼話又如何囑託你的你比他年紀大當説的不能不説陳育道他又沒有什麼教我怎生説李鏡泓回過頭去歎了一聲道此時我也知道是沒有什麼等到有了什麼的時候只怕説已遲了呢陳育聽了不耐煩正待搶白兩句陳蒿已在外面喊道姐姐怎麼還不來呢魚鰾膠住了麼説得周撰何達武都大笑起來陳育起身應道就來了回頭問李鏡泓道你自己弄飯吃麼李鏡泓道你走了我就去隔壁小西洋料理店隨便吃幾角錢你聽見老二剛才喊你的話麼這也像閨女兼女留學生的聲口嗎陳育朝著李鏡泓臉上一口啐了道你管他像不像你才管得寬哩管到小姨子身上去了説著匆匆走到外面向周撰陪笑道對不起勞先生久等周撰少不得也客氣兩句四人仍照來時的座位上了汽車來到精養軒午膳周撰有意揮霍給心慕浮華的陳蒿看酒菜無非揀貴重的點買四人吃了個酒醉飯飽周撰向汽車夫説了遊行十五區的意思車不必開行太速周撰在車中每經過一條街道必指點説明給陳育姊妹聽遇了繁盛地方就叫停車引著到那些大店家觀覽陳蒿看了心愛的物件或是問價或是説這東西好耍子只要價錢在幾十元以內周撰必悄悄的買了交給車夫拿著共買了百多塊錢的貨物妝飾品占了大半觀覽完了上車周撰才拿出來雙手遞給陳蒿笑道小姐説好耍子的都替小姐買來了陳蒿嚇了一跳打開來看大包小裹一二十件陳育笑道周先生這不是胡鬧嗎花許多錢買這些東西有什麼用處老二你也太小孩子氣了看了這樣也説好看了那樣也説好害得周先生花了這麼些錢陳蒿笑道我又沒教他買他買好了我們還不曾知道呢怪得我嗎東西本來好我説好又沒説錯何達武掉轉身軀來説道我就沒人買一文錢東西送給我我看了説好的時候也不少連那些忘八蛋的店夥見我衣服穿得平常我問他們的價十有九都不睬我二姑娘我教給你一個法子陳蒿道什麼法子何達武笑道你二次和蔔先同走的時候專揀貴重的東西説好同走得三五次不發了財嗎陳蒿猛不防在何達武臉上啐了一口唾沫道狗屁周撰也在後面叱道鐵腳還不替我安靜些坐著何達武用衣袖揩了臉上唾沫肩膊一聳舌頭一伸道東家發了氣我再不安靜些不僅沒有大力士看汽車都可不許我坐三人看了那鬼頭鬼腦的樣子都笑起來陳蒿將物件裹好回頭向周撰説了聲多謝周撰見陳蒿眉目間表示無限的風情心裏一痛快周身骨節都覺得軟洋洋的汽車雖開行不甚迅速但十五區可遊行的地方不多到四點多鍾都遊了一遍就只幾處公園陳育姊妹都遊過一兩次懶得下車周撰見汽車正經過神樂阪即教車夫將車停在阪下等候拿了兩塊錢鈔票賞給車夫去吃飯帶了陳育姊妹同何達武下車陳蒿問道這是什麼所在我們到哪里去周撰道這叫神樂阪下上面是一條很熱鬧的街道只是路仄不大好坐汽車小姐會坐腳踏車麼陳蒿笑道女人家坐什麼腳踏車呢周撰哈哈笑道女子為什麼不坐腳踏車還有專給女子乘坐的腳踏車呢上下比男子乘坐的容易些日本女學生多有乘著上課的陳蒿喜道我卻不曾見過容易學習麼周撰道像小姐這種活潑身體只須兩三小時我包管乘著在街上行走陳蒿道到什麼地方學習哩周撰道無論什麼都可以到處有租借腳踏車的店子每家店子後面都有練習的地方每小時不過兩角錢陳蒿望著周撰笑道你會坐麼周撰也笑道我若不會坐也不問你了陳育道那東西犯不著坐它我總覺得危險稍不留神的時候不是碰了人家就給人家碰了陳蒿搖頭道那怕什麼街上來來往往的多少何嘗碰倒過不留神就是步行也有給人碰倒的那如何説得既是兩三小時可以學會我一定要學將來回中國去帶一輛在身邊又靈巧又便利多好呢周撰道只求能在街上行走容易極了我可擔任教授陳蒿笑道不只求能在街上行走還能上房子嗎周撰道你不曾見過專研究乘腳踏車的所以這麼説將來有機會我帶你去看一回就知道了此時説出來徒然駭人聽聞何達武搶到前面向周撰説道你們説笑著走把路程只怕忘記了畢竟打算去哪里哩周撰道你坐了幾點鍾的車才走這幾步路你兩只有名的鐵腳就走痛了嗎何達武道腳倒沒走痛你看這條街都走完了周撰向兩邊望了一望指著前面一家日本料理店道我們就到那家去吃點兒日本料理權當晚膳我因時間還早恐怕他二位吃不下因此在街上多走幾步何達武笑道既是這麼多走幾步也好我因見你沒説明去哪里怕你貪著説話把路程忘了我今日橫豎合算看的也有吃的也有只可惜汽車白停在那裏也要按時間計算若早知道間逛這麼久何不給我坐著去看幾處朋友也顯得我不是等間之輩陳育笑問道誰把你當等間之輩你要拿汽車去壓服他哩何達武道就是平常幾個同場玩錢的最歡喜瞧人不起很挖苦了我幾次我若是坐了那汽車到各處走一趟他們一定你傳我我傳你的説何鐵腳不知在哪里弄了一注財喜坐著汽車在街上橫沖直撞下次同他們玩錢就不敢輕視我了萬一手氣不好把本錢輸完了向他們借墊幾個他們決不敢做出愁眉苦臉的樣子硬説不肯咳這機會真可惜了説得三人笑的肚子痛説笑著已進了料理店四個下女列隊一般的跪在臺階上齊聲高呼請進四人脫了皮靴下女引到樓上一間八疊席的房內陳蒿看房中席子都是錦邊陳設也古雅極了笑向陳育道我只道小鬼的房屋都是和我們現在住的一樣紙糊篾扎的原來也有這麼富麗的周撰答道這種房間哪能算得富麗這是極普通的日本式房屋最精致的建築費比西式上等房屋有多無少你看這種露在外面的柱頭不過四五寸的口徑彎彎曲曲的不像一根成材的木料試問問價值看每根不過一丈來長最好的須兩千元次等的都是千多這地方凹進一疊席子名叫床間日本人造房子對於這床間最要緊你們看鋪在底下的這塊木板好的也得上千普通人住的房子這地方也是席子的居多間有鋪木板的都是兩塊鑲起來就有整塊的也不是好木料這種門名叫唐紙普通都是印花紙糊的不值多少錢最上等的我雖沒有見過但據日本紳士説一扇門有值五百元以上的你們大概計算計算不比西式房子還貴嗎陳蒿道既花這麼些錢為什麼不造西式房子要造出這些和雞塒差不多的房子來住呢周撰道日本人起居習慣是這種雞塒般的房子便利房屋一更改衣服器具一切都得更改所謂積重難反不是容易的事並且日本地震極多每月震得很厲害的像這日本式的房屋哪怕高至三四層因做得合縫幾方面互相牽掣了能受極強的震蕩縱不幸坍塌下來而全體都系木質橫七豎八的撑架住了人在裏面多能保得性命不比西式房屋一坍塌便貼地坍塌了住在裏面的人不獨保不了性命還要壓成肉泥何達武聽得不願意了咧了聲道蔔先下女站在這裏半天了你也不點菜只顧説話看你把大家的肚子説得飽麼周撰道你這鐵腳專搗亂下女什麼時候在這裏站了半天我看你是餓傷了好我們就坐下來點菜罷四人都就蒲團坐下下女捧過功能表來周撰讓陳育先點陳育道先生再不要客氣了罷我們都沒吃過日本料理也不知道哪樣能吃隨先生的意點幾樣便了周撰知是實話便不再讓陳蒿卻從周撰手中接過功能表笑道我雖沒吃過倒不可不見識見識一看功能表上儘是寫的假名一樣也看不出是什麼菜來提起對周撰身上一摜賭氣不看丁周撰拾起來笑道留學生吃日本料理能在功能表上説得出十樣萊的一百人中恐怕不到三五個人陳育道什麼原故周撰拿起鉛筆一邊開菜一邊答道沒有什麼原故就是日本料理不中吃沒人願意研究都不過偶然高興如我們今天一樣吃了之後誰還記得功能表上寫著什麼是什麼菜呢周撰寫好交給下女去了不一會下女端出一大盤生魚來陳蒿見盤內紅紅緑緑很好看的樣子一看許多生竹葉插在幾片蘿蔔上和紅色的生魚映射起來倒也好看問周撰道這生魚片是穿了吃麼周撰笑道就這麼吃這是日本料理中最可究的菜陳育道不腥嗎周撰道倒好沒腥氣請試一片就知道了陳育姊妹都不肯試周撰問何達武吃過麼何達武搖頭笑道我也是和尚做新郎初試第一回周撰笑著拿筷子夾了一片先沾了些芥末再沾了些醬油三人望著他往口裏一送吃得很有滋味的樣子何達武登時也夾一片照樣吃了連連咂嘴説好吃陳育姊妹便也大家吃起來下女又端了一盤生牛肉進來陳蒿笑道怎麼儘是生的牛肉也可生吃嗎周撰道牛肉原可以生吃但不是這麼吃的這是用鐵鍋臨時燒了吃還有火爐鐵鍋不曾拿來正説著隨後進來一個下女捧著火爐鐵鍋之類陳蒿看那鐵鍋只有五六寸大小鍋底是坦平的下女把鍋安在火爐上放入桌之當中用筷子從牛肉盤內夾了一塊牛油在鍋內繞了幾轉略略燒出了些油便將醬油傾了下去把盤內的牛肉一片一片夾入